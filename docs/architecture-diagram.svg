<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      
      @keyframes flowArrow {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -20; }
      }
      
      .component {
        animation: slideIn 0.6s ease-out forwards;
      }
      
      .flow-arrow {
        stroke-dasharray: 10, 10;
        animation: flowArrow 2s linear infinite;
        stroke: #4F46E5;
        stroke-width: 2;
        fill: none;
      }
      
      .label {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 14px;
        font-weight: 600;
        fill: #1F2937;
      }
      
      .sub-label {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 12px;
        fill: #6B7280;
      }
      
      .title {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 24px;
        font-weight: 700;
        fill: #1F2937;
      }
      
      .module-box {
        cursor: pointer;
        transition: all 0.3s ease;
      }
      
      .module-box:hover rect {
        filter: drop-shadow(0 0 8px rgba(79, 70, 229, 0.3));
      }
      
      .pulse-circle {
        animation: pulse 2s ease-in-out infinite;
      }
      
      .gradient-bg { stop-color: #4F46E5; }
      .gradient-bg2 { stop-color: #06B6D4; }
      .gradient-accent { stop-color: #10B981; }
    </style>
    
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="gradient-bg"/>
      <stop offset="100%" class="gradient-bg2"/>
    </linearGradient>
    
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="gradient-accent"/>
      <stop offset="100%" style="stop-color: #059669;"/>
    </linearGradient>
    
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #F59E0B;"/>
      <stop offset="100%" style="stop-color: #D97706;"/>
    </linearGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4F46E5"/>
    </marker>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="title">Sentinel AI Gateway Architecture</text>
  
  <!-- Step 1: Client Request -->
  <g class="component" style="animation-delay: 0s;">
    <rect x="50" y="100" width="140" height="80" rx="12" fill="url(#grad1)" filter="url(#shadow)"/>
    <text x="75" y="125" text-anchor="middle" class="label" fill="white" font-size="18" font-weight="700">👤</text>
    <text x="120" y="135" text-anchor="middle" class="label" fill="white" font-size="13" font-weight="700" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Client Request</text>
    <text x="120" y="155" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">User Prompt</text>
  </g>
  
  <!-- Arrow 1 -->
  <defs>
    <path id="arrow1" d="M 190 140 L 270 140" fill="none" stroke-width="2"/>
  </defs>
  <path class="flow-arrow" d="M 190 140 L 270 140" marker-end="url(#arrowhead)"/>
  <circle cx="230" cy="140" r="3" fill="#4F46E5" class="pulse-circle"/>
  
  <!-- Step 2: FastAPI Server -->
  <g class="component" style="animation-delay: 0.1s;">
    <rect x="270" y="100" width="140" height="80" rx="12" fill="url(#grad1)" filter="url(#shadow)"/>
    <text x="295" y="125" text-anchor="middle" class="label" fill="white" font-size="18" font-weight="700">⚡</text>
    <text x="340" y="135" text-anchor="middle" class="label" fill="white" font-size="13" font-weight="700" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">FastAPI</text>
    <text x="340" y="155" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">HTTP Router</text>
  </g>
  
  <!-- Arrow 2 -->
  <path class="flow-arrow" d="M 410 140 L 490 140" marker-end="url(#arrowhead)"/>
  <circle cx="450" cy="140" r="3" fill="#4F46E5" class="pulse-circle" style="animation-delay: 0.3s;"/>
  
  <!-- Step 3: Middleware -->
  <g class="component" style="animation-delay: 0.2s;">
    <rect x="490" y="100" width="160" height="80" rx="12" fill="url(#grad3)" filter="url(#shadow)"/>
    <text x="510" y="125" text-anchor="middle" class="label" fill="white" font-size="18" font-weight="700">🔀</text>
    <text x="570" y="135" text-anchor="middle" class="label" fill="white" font-size="13" font-weight="700" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Middleware</text>
    <text x="570" y="155" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Interception</text>
  </g>
  
  <!-- Arrow 3 -->
  <path class="flow-arrow" d="M 650 140 L 730 140" marker-end="url(#arrowhead)"/>
  <circle cx="690" cy="140" r="3" fill="#4F46E5" class="pulse-circle" style="animation-delay: 0.6s;"/>
  
  <!-- Step 4: Guardrail Engine -->
  <g class="component" style="animation-delay: 0.3s;">
    <rect x="730" y="80" width="170" height="120" rx="12" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="755" y="105" text-anchor="middle" class="label" fill="white" font-size="18" font-weight="700">🛡️</text>
    <text x="815" y="118" text-anchor="middle" class="label" fill="white" font-size="13" font-weight="700" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Guardrail Engine</text>
    <text x="815" y="138" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Orchestration</text>
    <line x1="745" y1="150" x2="895" y2="150" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="815" y="170" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Module Pipeline</text>
  </g>
  
  <!-- Module 1: PII -->
  <g class="component module-box" style="animation-delay: 0.4s;">
    <rect x="730" y="250" width="155" height="70" rx="10" fill="#EF4444" fill-opacity="0.15" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="750" y="268" text-anchor="middle" class="label" fill="#EF4444" font-size="20">🔐</text>
    <text x="815" y="270" text-anchor="middle" class="label" fill="#1F2937" font-size="12" font-weight="700">PII Redaction</text>
    <text x="815" y="287" text-anchor="middle" class="sub-label" fill="#374151" font-size="9">Email, SSN, Phone</text>
  </g>
  
  <!-- Module 2: Injection -->
  <g class="component module-box" style="animation-delay: 0.5s;">
    <rect x="920" y="250" width="155" height="70" rx="10" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
    <text x="940" y="268" text-anchor="middle" class="label" fill="#8B5CF6" font-size="20">🛡️</text>
    <text x="1005" y="270" text-anchor="middle" class="label" fill="#1F2937" font-size="12" font-weight="700">Injection Block</text>
    <text x="1005" y="287" text-anchor="middle" class="sub-label" fill="#374151" font-size="9">SQL, Command, XSS</text>
  </g>
  
  <!-- Connections to modules -->
  <path class="flow-arrow" d="M 815 200 L 815 250" style="animation-delay: 0.3s;" marker-end="url(#arrowhead)"/>
  <path class="flow-arrow" d="M 815 200 L 1010 250" style="animation-delay: 0.3s;" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow to LLM -->
  <path class="flow-arrow" d="M 815 360 L 815 420" marker-end="url(#arrowhead)" style="animation-delay: 0.6s;"/>
  <circle cx="815" cy="390" r="3" fill="#4F46E5" class="pulse-circle" style="animation-delay: 0.8s;"/>
  
  <!-- Step 5: LLM Provider -->
  <g class="component" style="animation-delay: 0.6s;">
    <rect x="730" y="420" width="170" height="100" rx="12" fill="url(#grad1)" filter="url(#shadow)"/>
    <text x="755" y="443" text-anchor="middle" class="label" fill="white" font-size="18" font-weight="700">🤖</text>
    <text x="815" y="456" text-anchor="middle" class="label" fill="white" font-size="13" font-weight="700" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">LLM Provider</text>
    <line x1="745" y1="468" x2="895" y2="468" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="815" y="488" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">OpenAI, Gemini,</text>
    <text x="815" y="503" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Anthropic</text>
  </g>
  
  <!-- Arrow back to middleware -->
  <path class="flow-arrow" d="M 730 470 L 650 470" marker-end="url(#arrowhead)" style="animation-delay: 0.8s;"/>
  <circle cx="690" cy="470" r="3" fill="#4F46E5" class="pulse-circle" style="animation-delay: 1s;"/>
  
  <!-- Response processing -->
  <g class="component" style="animation-delay: 0.7s;">
    <rect x="490" y="420" width="160" height="100" rx="12" fill="url(#grad3)" filter="url(#shadow)"/>
    <text x="510" y="443" text-anchor="middle" class="label" fill="white" font-size="18" font-weight="700">⚙️</text>
    <text x="570" y="456" text-anchor="middle" class="label" fill="white" font-size="13" font-weight="700" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Response</text>
    <text x="570" y="471" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Processing</text>
    <line x1="505" y1="485" x2="635" y2="485" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="570" y="504" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Streaming &amp;</text>
    <text x="570" y="519" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Redaction</text>
  </g>
  
  <!-- Arrow to client response -->
  <path class="flow-arrow" d="M 490 470 L 410 470" marker-end="url(#arrowhead)" style="animation-delay: 1s;"/>
  <circle cx="450" cy="470" r="3" fill="#4F46E5" class="pulse-circle" style="animation-delay: 1.2s;"/>
  
  <!-- Final response -->
  <g class="component" style="animation-delay: 0.8s;">
    <rect x="270" y="420" width="140" height="100" rx="12" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="295" y="443" text-anchor="middle" class="label" fill="white" font-size="18" font-weight="700">✅</text>
    <text x="340" y="456" text-anchor="middle" class="label" fill="white" font-size="13" font-weight="700" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Safe Response</text>
    <line x1="285" y1="468" x2="395" y2="468" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="340" y="488" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">PII Redacted</text>
    <text x="340" y="503" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Threats Blocked</text>
  </g>
  
  <!-- Arrow to user -->
  <path class="flow-arrow" d="M 270 470 L 190 470" marker-end="url(#arrowhead)" style="animation-delay: 1.2s;"/>
  <circle cx="230" cy="470" r="3" fill="#4F46E5" class="pulse-circle" style="animation-delay: 1.4s;"/>
  
  <!-- User receives -->
  <g class="component" style="animation-delay: 0.9s;">
    <rect x="50" y="420" width="140" height="100" rx="12" fill="url(#grad1)" filter="url(#shadow)"/>
    <text x="75" y="443" text-anchor="middle" class="label" fill="white" font-size="18" font-weight="700">💬</text>
    <text x="120" y="456" text-anchor="middle" class="label" fill="white" font-size="13" font-weight="700" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">User</text>
    <line x1="65" y1="468" x2="175" y2="468" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="120" y="488" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Safe Response</text>
    <text x="120" y="503" text-anchor="middle" fill="#E8E8E8" font-size="12" font-weight="600" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">No Data Leaks</text>
  </g>
  
  <!-- Feature boxes at bottom -->
  <g class="component" style="animation-delay: 1s;">
    <rect x="50" y="640" width="180" height="110" rx="10" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="665" text-anchor="middle" class="label" fill="#EF4444" font-size="20">🔐</text>
    <text x="140" y="670" text-anchor="middle" class="label" fill="#1F2937" font-size="12" font-weight="700">PII Detection</text>
    <text x="140" y="690" text-anchor="middle" class="sub-label" fill="#374151" font-size="10">Hybrid regex + AI</text>
    <text x="140" y="705" text-anchor="middle" class="sub-label" fill="#374151" font-size="10">Presidio NER</text>
    <text x="140" y="720" text-anchor="middle" class="sub-label" fill="#374151" font-size="9">Streaming-safe</text>
  </g>
  
  <g class="component" style="animation-delay: 1.1s;">
    <rect x="260" y="640" width="180" height="110" rx="10" fill="#8B5CF6" fill-opacity="0.2" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
    <text x="280" y="665" text-anchor="middle" class="label" fill="#8B5CF6" font-size="20">⚔️</text>
    <text x="350" y="670" text-anchor="middle" class="label" fill="#1F2937" font-size="12" font-weight="700">Injection Block</text>
    <text x="350" y="690" text-anchor="middle" class="sub-label" fill="#374151" font-size="10">Pattern matching</text>
    <text x="350" y="705" text-anchor="middle" class="sub-label" fill="#374151" font-size="10">SQL, Command,</text>
    <text x="350" y="720" text-anchor="middle" class="sub-label" fill="#374151" font-size="9">Jailbreak, XSS</text>
  </g>
  
  <g class="component" style="animation-delay: 1.2s;">
    <rect x="470" y="640" width="180" height="110" rx="10" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
    <text x="490" y="665" text-anchor="middle" class="label" fill="#10B981" font-size="20">📊</text>
    <text x="560" y="670" text-anchor="middle" class="label" fill="#1F2937" font-size="12" font-weight="700">Observability</text>
    <text x="560" y="690" text-anchor="middle" class="sub-label" fill="#374151" font-size="10">OpenTelemetry +</text>
    <text x="560" y="705" text-anchor="middle" class="sub-label" fill="#374151" font-size="10">Prometheus &amp;</text>
    <text x="560" y="720" text-anchor="middle" class="sub-label" fill="#374151" font-size="9">Jaeger Tracing</text>
  </g>
  
  <!-- Legend -->
  <text x="50" y="610" text-anchor="start" class="sub-label" font-size="13" font-weight="700" fill="#1F2937">KEY FEATURES:</text>
  
  <!-- Data flow legend -->
  <path d="M 1050 100 L 1100 100" class="flow-arrow" stroke-width="1.5"/>
  <text x="1110" y="105" class="sub-label">Data Flow</text>
  
  <circle cx="1075" cy="130" r="3" fill="#4F46E5" class="pulse-circle"/>
  <text x="1110" y="135" class="sub-label">Active Request</text>
</svg>
