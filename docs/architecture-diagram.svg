<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes arrowFlow {
        0% { stroke-dashoffset: 12; }
        100% { stroke-dashoffset: 0; }
      }
      .arrow-animate { animation: arrowFlow 1.5s linear infinite; }
    </style>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #4F46E5; stop-opacity: 1"/>
      <stop offset="100%" style="stop-color: #06B6D4; stop-opacity: 1"/>
    </linearGradient>
    
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #10B981; stop-opacity: 1"/>
      <stop offset="100%" style="stop-color: #059669; stop-opacity: 1"/>
    </linearGradient>
    
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #F59E0B; stop-opacity: 1"/>
      <stop offset="100%" style="stop-color: #D97706; stop-opacity: 1"/>
    </linearGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2563EB"/>
    </marker>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#F9FAFB"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="24" font-weight="700" fill="#1F2937">Sentinel AI Gateway Architecture</text>
  
  <!-- Step 1: Client Request -->
  <g>
    <rect x="50" y="100" width="140" height="80" rx="12" fill="url(#grad1)" filter="url(#shadow)"/>
    <text x="75" y="125" text-anchor="middle" font-size="18" font-weight="700">👤</text>
    <text x="120" y="135" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="white" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Client Request</text>
    <text x="120" y="155" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">User Prompt</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 190 140 L 270 140" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowhead)" class="arrow-animate"/>
  <circle cx="230" cy="140" r="3" fill="#2563EB"/>
  
  <!-- Step 2: FastAPI Server -->
  <g>
    <rect x="270" y="100" width="140" height="80" rx="12" fill="url(#grad1)" filter="url(#shadow)"/>
    <text x="295" y="125" text-anchor="middle" font-size="18" font-weight="700">⚡</text>
    <text x="340" y="135" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="white" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">FastAPI</text>
    <text x="340" y="155" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">HTTP Router</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 410 140 L 490 140" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowhead)" class="arrow-animate"/>
  <circle cx="450" cy="140" r="3" fill="#2563EB"/>
  
  <!-- Step 3: Middleware -->
  <g>
    <rect x="490" y="100" width="160" height="80" rx="12" fill="url(#grad3)" filter="url(#shadow)"/>
    <text x="510" y="125" text-anchor="middle" font-size="18" font-weight="700">🔀</text>
    <text x="570" y="135" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="white" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Middleware</text>
    <text x="570" y="155" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Interception</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 650 140 L 730 140" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowhead)" class="arrow-animate"/>
  <circle cx="690" cy="140" r="3" fill="#2563EB"/>
  
  <!-- Step 4: Guardrail Engine -->
  <g>
    <rect x="730" y="80" width="170" height="120" rx="12" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="755" y="105" text-anchor="middle" font-size="18" font-weight="700">🛡️</text>
    <text x="815" y="118" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="white" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Guardrail Engine</text>
    <text x="815" y="138" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Orchestration</text>
    <line x1="745" y1="150" x2="895" y2="150" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="815" y="170" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Module Pipeline</text>
  </g>
  
  <!-- Module 1: PII -->
  <g>
    <rect x="730" y="250" width="155" height="70" rx="10" fill="#EF4444" fill-opacity="0.15" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="750" y="268" text-anchor="middle" font-size="20">🔐</text>
    <text x="815" y="270" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="700" fill="#1F2937">PII Redaction</text>
    <text x="815" y="287" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="9" fill="#374151">Email, SSN, Phone</text>
  </g>
  
  <!-- Module 2: Injection -->
  <g>
    <rect x="920" y="250" width="155" height="70" rx="10" fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
    <text x="940" y="268" text-anchor="middle" font-size="20">🛡️</text>
    <text x="1005" y="270" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="700" fill="#1F2937">Injection Block</text>
    <text x="1005" y="287" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="9" fill="#374151">SQL, Command, XSS</text>
  </g>
  
  <!-- Connections to modules -->
  <path d="M 815 200 L 815 250" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowhead)" class="arrow-animate"/>
  <path d="M 815 200 L 1010 250" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowhead)" class="arrow-animate"/>
  
  <!-- Arrow to LLM -->
  <path d="M 815 360 L 815 420" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowhead)" class="arrow-animate"/>
  <circle cx="815" cy="390" r="3" fill="#2563EB"/>
  
  <!-- Step 5: LLM Provider -->
  <g>
    <rect x="730" y="420" width="170" height="100" rx="12" fill="url(#grad1)" filter="url(#shadow)"/>
    <text x="755" y="443" text-anchor="middle" font-size="18" font-weight="700">🤖</text>
    <text x="815" y="456" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="white" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">LLM Provider</text>
    <line x1="745" y1="468" x2="895" y2="468" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="815" y="488" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">OpenAI, Gemini,</text>
    <text x="815" y="503" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Anthropic</text>
  </g>
  
  <!-- Arrow back to middleware -->
  <path d="M 730 470 L 650 470" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowhead)" class="arrow-animate"/>
  <circle cx="690" cy="470" r="3" fill="#2563EB"/>
  
  <!-- Response processing -->
  <g>
    <rect x="490" y="420" width="160" height="100" rx="12" fill="url(#grad3)" filter="url(#shadow)"/>
    <text x="510" y="443" text-anchor="middle" font-size="18" font-weight="700">⚙️</text>
    <text x="570" y="456" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="white" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Response</text>
    <text x="570" y="471" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Processing</text>
    <line x1="505" y1="485" x2="635" y2="485" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="570" y="504" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Streaming &amp;</text>
    <text x="570" y="519" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Redaction</text>
  </g>
  
  <!-- Arrow to client response -->
  <path d="M 490 470 L 410 470" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowhead)" class="arrow-animate"/>
  <circle cx="450" cy="470" r="3" fill="#2563EB"/>
  
  <!-- Final response -->
  <g>
    <rect x="270" y="420" width="140" height="100" rx="12" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="295" y="443" text-anchor="middle" font-size="18" font-weight="700">✅</text>
    <text x="340" y="456" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="white" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">Safe Response</text>
    <line x1="285" y1="468" x2="395" y2="468" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="340" y="488" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">PII Redacted</text>
    <text x="340" y="503" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Threats Blocked</text>
  </g>
  
  <!-- Arrow to user -->
  <path d="M 270 470 L 190 470" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="8,4" fill="none" marker-end="url(#arrowhead)" class="arrow-animate"/>
  <circle cx="230" cy="470" r="3" fill="#2563EB"/>
  
  <!-- User receives -->
  <g>
    <rect x="50" y="420" width="140" height="100" rx="12" fill="url(#grad1)" filter="url(#shadow)"/>
    <text x="75" y="443" text-anchor="middle" font-size="18" font-weight="700">💬</text>
    <text x="120" y="456" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="white" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.3);">User</text>
    <line x1="65" y1="468" x2="175" y2="468" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="120" y="488" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">Safe Response</text>
    <text x="120" y="503" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="600" fill="#E8E8E8" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">No Data Leaks</text>
  </g>
  
  <!-- Feature boxes at bottom -->
  <g>
    <rect x="50" y="640" width="180" height="110" rx="10" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
    <text x="70" y="665" text-anchor="middle" font-size="20">🔐</text>
    <text x="140" y="670" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="700" fill="#1F2937">PII Detection</text>
    <text x="140" y="690" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" fill="#374151">Hybrid regex + AI</text>
    <text x="140" y="705" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" fill="#374151">Presidio NER</text>
    <text x="140" y="720" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="9" fill="#374151">Streaming-safe</text>
  </g>
  
  <g>
    <rect x="260" y="640" width="180" height="110" rx="10" fill="#8B5CF6" fill-opacity="0.2" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)"/>
    <text x="280" y="665" text-anchor="middle" font-size="20">⚔️</text>
    <text x="350" y="670" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="700" fill="#1F2937">Injection Block</text>
    <text x="350" y="690" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" fill="#374151">Pattern matching</text>
    <text x="350" y="705" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" fill="#374151">SQL, Command,</text>
    <text x="350" y="720" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="9" fill="#374151">Jailbreak, XSS</text>
  </g>
  
  <g>
    <rect x="470" y="640" width="180" height="110" rx="10" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
    <text x="490" y="665" text-anchor="middle" font-size="20">📊</text>
    <text x="560" y="670" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" font-weight="700" fill="#1F2937">Observability</text>
    <text x="560" y="690" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" fill="#374151">OpenTelemetry +</text>
    <text x="560" y="705" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="10" fill="#374151">Prometheus &amp;</text>
    <text x="560" y="720" text-anchor="middle" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="9" fill="#374151">Jaeger Tracing</text>
  </g>
  
  <!-- Legend -->
  <text x="50" y="610" text-anchor="start" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="13" font-weight="700" fill="#1F2937">KEY FEATURES:</text>
  
  <!-- Data flow legend -->
  <path d="M 1050 100 L 1100 100" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="8,4" fill="none" class="arrow-animate"/>
  <text x="1110" y="105" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" fill="#6B7280">Data Flow</text>
  
  <circle cx="1075" cy="130" r="3" fill="#2563EB"/>
  <text x="1110" y="135" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="12" fill="#6B7280">Active Request</text>
</svg>
