global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sentinel-gateway-monitor'

scrape_configs:
  - job_name: 'sentinel-gateway'
    static_configs:
      - targets: ['sentinel-gateway:8001']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    metrics_path: '/metrics'
